name: CI

# kannaka-eye is a single-file vision server with no package.json.
# CI runs a node syntax-check on every JS source plus the SGA
# consistency smoke test the repo already has. Adds real testing
# value: parse errors and SGA classifier drift would fail PRs.
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check JS sources
        run: |
          set -euo pipefail
          find . -maxdepth 2 -type f \( -name "*.js" -o -name "*.mjs" \) \
                 -not -path "./node_modules/*" \
                 -print0 \
            | xargs -0 -n1 node --check

      - name: SGA consistency check
        run: node tests/sga_consistency.mjs
        # Golden self-consistency test of the eye's JS SGA decode. It spawns
        # the server (native classifier forced off) and asserts /api/process
        # matches the in-repo golden vectors — see the header in
        # tests/sga_consistency.mjs for the exact contract. This genuinely
        # gates: JS classifier drift or a parse/runtime regression fails CI.
